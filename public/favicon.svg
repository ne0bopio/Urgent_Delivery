<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">

  <!-- Background: brand olive -->
  <rect width="32" height="32" rx="6" fill="#2F3A33"/>

  <!-- Speed lines (motion blur feel) -->
  <line x1="1" y1="17" x2="6"  y2="17" stroke="#1F5A52" stroke-width="1"   opacity="0.7"/>
  <line x1="1" y1="19" x2="4"  y2="19" stroke="#1F5A52" stroke-width="0.7" opacity="0.4"/>

  <!-- Van body (cargo box) -->
  <rect x="5" y="11" width="14" height="10" rx="1" fill="#EDEBE7"/>

  <!-- Van cab (front) -->
  <rect x="19" y="13" width="7"  height="8"  rx="1" fill="#EDEBE7"/>

  <!-- Windshield cutout (dark angled glass) -->
  <polygon points="20,13.5 25,13.5 24.5,18 20.5,18" fill="#2F3A33" opacity="0.7"/>

  <!-- Cab roof slope connecting cargo to cab -->
  <polygon points="19,11 19,13 26,13 26,11" fill="#EDEBE7"/>

  <!-- Headlight: coral accent -->
  <rect x="25.5" y="15.5" width="1.5" height="2" rx="0.3" fill="#F26A5B"/>

  <!-- Rear tail light -->
  <rect x="5"    y="14"   width="1"   height="2" rx="0.3" fill="#F26A5B" opacity="0.8"/>

  <!-- Rear wheel -->
  <circle cx="10" cy="23" r="3"   fill="#1a1a1a"/>
  <circle cx="10" cy="23" r="2"   fill="#2F3A33"/>
  <circle cx="10" cy="23" r="0.7" fill="#F26A5B"/>

  <!-- Front wheel -->
  <circle cx="22" cy="23" r="3"   fill="#1a1a1a"/>
  <circle cx="22" cy="23" r="2"   fill="#2F3A33"/>
  <circle cx="22" cy="23" r="0.7" fill="#F26A5B"/>

  <!-- Side panel stripe (teal accent line on cargo box) -->
  <line x1="5" y1="16" x2="19" y2="16" stroke="#1F5A52" stroke-width="0.7" opacity="0.6"/>

  <!-- Ground shadow -->
  <ellipse cx="16" cy="27.5" rx="12" ry="1.2" fill="#000" opacity="0.2"/>

</svg>
